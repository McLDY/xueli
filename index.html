<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Microsoft YaHei",sans-serif;
  background:#050816;
  color:#fff;
}

/* Layout toggle */
.desktop-layout, .mobile-layout { display:none }
body.desktop .desktop-layout { display:block }
body.mobile .mobile-layout { display:block }

/* === DESKTOP === */
.desktop-layout .header{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 30px;
  background:#0a1025;
  border-bottom:1px solid #00d9ff55;
}
.desktop-layout .logo{font-size:28px;color:#00d9ff;font-weight:bold}
.desktop-layout .nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.desktop-layout .nav a{color:white;text-decoration:none;padding:8px 14px;border-radius:8px}
.desktop-layout .nav a:hover{background:#00d9ff22}
.desktop-layout .search input{padding:10px 15px;border:none;border-radius:8px;background:#111b3a;color:white;width:240px}
.desktop-layout .hero{display:flex;justify-content:center;align-items:center;gap:40px;padding:50px 30px}
.desktop-layout .card{
  flex:1;min-height:320px;
  background:#0c1430;border:1px solid #00d9ff44;
  border-radius:18px;padding:30px;
  box-shadow:0 0 20px rgba(0,217,255,.15);
}
.desktop-layout .card h1{margin-bottom:15px}
.desktop-layout .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-top:20px}
.desktop-layout .stat{background:#121d40;padding:15px;border-radius:12px;text-align:center;white-space:nowrap;overflow:hidden}
.desktop-layout .stat b{display:block;font-size:24px;color:#00d9ff}
.desktop-layout .stat-label{font-size:13px;color:#fff;display:block;margin-top:2px}
.desktop-layout .tl-wrap{padding:20px 30px 60px}
.desktop-layout .tl-col{
  background:#0c1430;border-radius:18px;padding:25px;
  border:1px solid #00d9ff44;
}
.desktop-layout .tl-col h2{margin-bottom:20px;color:#00d9ff}
.desktop-layout .tl-list{position:relative;padding-left:20px}
.desktop-layout .tl-list::before{
  content:'';position:absolute;left:6px;top:8px;bottom:8px;
  width:2px;background:linear-gradient(to bottom,#00d9ff66,#d86fff66);border-radius:1px;
}
.desktop-layout .tl-node{position:relative;margin-bottom:28px;padding-left:8px}
.desktop-layout .tl-node::before{
  content:'';position:absolute;left:-16px;top:5px;
  width:12px;height:12px;border-radius:50%;
  background:linear-gradient(135deg,#00d9ff,#d86fff);
  border:2px solid #0c1430;box-shadow:0 0 8px rgba(0,217,255,.4);
}
.desktop-layout .tl-date{font-size:13px;color:#00d9ff;font-weight:bold;margin-bottom:6px}
.desktop-layout .tl-box{
  background:#0a1025;border:1px solid #00d9ff33;border-radius:10px;
  padding:12px 16px;font-size:14px;line-height:1.7;color:#ddd;
}
.desktop-layout .tl-box strong{color:#fff}
.desktop-layout .tl-box em{color:#00d9ff}
.desktop-layout .tl-box a{color:#00d9ff}
.desktop-layout .tl-empty{color:#666;padding:20px;text-align:center}
.desktop-layout .footer{text-align:center;padding:20px;border-top:1px solid #00d9ff33}

/* === MOBILE === */
.mobile-layout{padding-bottom:80px}
.mobile-layout .header{
  position:sticky;top:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:15px;background:#08101f;
  border-bottom:1px solid rgba(0,229,255,.3);
}
.mobile-layout .logo{font-size:22px;font-weight:bold;color:#00E5FF}
.mobile-layout .icon{font-size:24px}
.mobile-layout .hero{text-align:center;padding:30px 20px}
.mobile-layout .title{
  font-size:32px;margin-top:20px;
  background:linear-gradient(135deg,#00E5FF,#D86FFF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.mobile-layout .subtitle{color:#bdbdbd;margin-top:10px}
.mobile-layout .section{padding:20px}
.mobile-layout .card{
  background:#0d1328;border:1px solid rgba(0,229,255,.2);
  border-radius:16px;padding:18px;margin-bottom:15px;
}
.mobile-layout .card h3{margin-bottom:10px;color:#00E5FF}
.mobile-layout .fans-bar{
  text-align:center;padding:10px 20px;font-size:18px;
  color:#00E5FF;background:#0d1328;margin:0 20px;
  border-radius:12px;border:1px solid rgba(0,229,255,.2);
}
.mobile-layout .mob-tl{position:relative;padding-left:16px}
.mobile-layout .mob-tl::before{
  content:'';position:absolute;left:4px;top:8px;bottom:8px;
  width:2px;background:linear-gradient(to bottom,#00d9ff66,#d86fff66);border-radius:1px;
}
.mobile-layout .mob-tl-item{position:relative;margin-bottom:20px;padding-left:6px}
.mobile-layout .mob-tl-item::before{
  content:'';position:absolute;left:-14px;top:4px;
  width:10px;height:10px;border-radius:50%;
  background:linear-gradient(135deg,#00d9ff,#d86fff);
  border:2px solid #0d1328;box-shadow:0 0 6px rgba(0,217,255,.4);
}
.mobile-layout .mob-tl-date{font-size:12px;color:#00d9ff;font-weight:bold;margin-bottom:4px}
.mobile-layout .mob-tl-box{
  background:#070c1a;border:1px solid #00d9ff33;border-radius:8px;
  padding:10px 12px;font-size:13px;line-height:1.6;color:#ccc;
}
.mobile-layout .mob-tl-box strong{color:#fff}
.mobile-layout .mob-tl-box em{color:#00d9ff}
.mobile-layout .mob-tl-box a{color:#00d9ff}
.mobile-layout .mob-tl-empty{color:#666;padding:10px;text-align:center;font-size:13px}
.mobile-layout .bottom-nav{
  position:fixed;bottom:0;left:0;width:100%;height:65px;
  background:#08101f;border-top:1px solid rgba(0,229,255,.3);
  display:flex;justify-content:space-around;align-items:center;
}
.mobile-layout .bottom-nav a{color:white;text-decoration:none;font-size:13px;text-align:center}
.mobile-layout .bottom-nav span{display:block;font-size:22px}
</style>
</head>
<body>

<!-- DESKTOP -->
<div class="desktop-layout">
  <header class="header">
    <div class="logo">My World</div>
    <nav class="nav">
      <a href="#">首页</a><a href="#">介绍</a><a href="#">分类</a>
      <a href="#">直播</a><a href="#">作品</a><a href="#">留言板</a>
      <a href="https://space.bilibili.com/394065596" target="_blank">雪梨B站</a>
    </nav>
    <div class="search"><input type="text" placeholder="搜索内容..."></div>
  </header>

  <section class="hero">
    <div class="card">
      <h1>Hello, I'm Myself</h1>
      <p>个人主页入口</p>
      <div class="stats">
        <div class="stat"><b>0</b>项目</div>
        <div class="stat"><b>0</b>文章</div>
        <div class="stat"><b id="fans-count">0</b>粉丝</div>
        <div class="stat"><b id="myself-dynamics">0</b>动态</div>
      </div>
    </div>
    <div class="card">
      <h1>雪梨 · 虚拟主播</h1>
      <p id="xueli-sign">二次元虚拟主播主页入口</p>
      <div class="stats">
        <div class="stat"><b id="xueli-live">0</b><span class="stat-label">直播</span></div>
        <div class="stat"><b id="xueli-fans">0</b>粉丝</div>
        <div class="stat"><b id="xueli-works">0</b>作品</div>
        <div class="stat"><b id="xueli-dynamics">0</b>动态</div>
      </div>
    </div>
  </section>

  <section class="tl-wrap">
    <div class="tl-col">
      <h2>雪梨的动态时间轴</h2>
      <div class="tl-list" id="tl-xueli-list"></div>
    </div>
  </section>

  <footer class="footer">&copy; 2026 My World &middot; All Rights Reserved</footer>
</div>

<!-- MOBILE -->
<div class="mobile-layout">
  <header class="header">
    <div class="icon">&#9776;</div>
    <div class="logo">My World</div>
    <div class="icon">&#128269;</div>
  </header>
  <section class="hero">
    <h1 class="title">Welcome To My World</h1>
    <p class="subtitle">Connecting Two Worlds</p>
  </section>
  <div class="fans-bar">
    <span id="xueli-mobile-name">雪梨</span> 的粉丝 <b id="fans-count-mobile">0</b>
    <span> &middot; 直播: <b id="xueli-mobile-live">0</b></span>
    <span> &middot; 作品: <b id="xueli-mobile-works">0</b></span>
    <span> &middot; 动态: <b id="xueli-mobile-dynamics">0</b></span>
  </div>
  <section class="section">
    <div class="card">
      <h3>雪梨动态</h3>
      <div class="mob-tl" id="mob-tl-xueli"></div>
    </div>
  </section>
  <nav class="bottom-nav">
    <a href="#"><span>&#127968;</span>首页</a>
    <a href="#"><span>&#128220;</span>时间轴</a>
    <a href="https://space.bilibili.com/394065596" target="_blank"><span>&#127800;</span>雪梨B站</a>
  </nav>
</div>

<script>
(function(){
  var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
              || window.innerWidth < 768;
  document.body.className = isMobile ? 'mobile' : 'desktop';
  window.__isMobile = isMobile;
})();

function setText(id, val) {
  var el = document.getElementById(id);
  if (el) el.textContent = val;
}

function render(d) {
  if (!d) return;
  setText('xueli-mobile-name', d.name || '雪梨');
  setText('fans-count', d.fans || 0);
  setText('xueli-fans', d.fans || 0);
  setText('fans-count-mobile', d.fans || 0);
  setText('xueli-live', d.live_status === 1 ? '直播中' : '离线');
  setText('xueli-mobile-live', d.live_status === 1 ? '直播中' : '离线');
  setText('xueli-works', d.works || 0);
  setText('xueli-mobile-works', d.works || 0);
  setText("xueli-dynamics", d.dynamics || 0);
  setText("xueli-mobile-dynamics", d.dynamics || 0);
  setText("myself-dynamics", d.dynamics || 0);
  if (d.live_title) setText('xueli-sign', d.live_title);
}

function renderTimeline(d) {
  var isM = window.__isMobile;
  var el = document.getElementById(isM ? 'mob-tl-xueli' : 'tl-xueli-list');
  if (!el || !d) return;

  var cls  = isM ? 'mob-tl-' : 'tl-';
  var html = '';

  html += '<div class="' + cls + 'node"><div class="' + cls + 'date">' +
    (d.updated_at ? d.updated_at.slice(0,10) : '') + '</div>' +
    '<div class="' + cls + 'box"><strong>📊 数据概览</strong><br>' +
    '👥 粉丝 <b>' + (d.fans||0) + '</b> &nbsp;|&nbsp; 作品 <b>' + (d.works||0) + '</b><br>' +
    '📝 动态 <b>' + (d.dynamics||0) + '</b> &nbsp;|&nbsp; 图文 <b>' + (d.albums||0) + '</b><br>' +
    '直播 ' + (d.live_status===1?'🟢 直播中':'⚫ 离线') + '</div></div>';

  if (d.live_title) {
    html += '<div class="' + cls + 'node"><div class="' + cls + 'date"></div>' +
      '<div class="' + cls + 'box">🎤 <a href="https://live.bilibili.com/' +
      (d.room_id||'') + '" target="_blank">' + d.live_title + '</a></div></div>';
  }

  el.innerHTML = html || '<div class="' + cls + 'empty">暂无动态</div>';
}

async function refresh() {
  try {
    var r = await fetch('./data.json?' + Date.now());
    if (!r.ok) return console.warn('data.json HTTP ' + r.status);
    var d = await r.json();
    render(d);
    renderTimeline(d);
  } catch(e) { console.warn(e); }
}

refresh();
setInterval(refresh, 90000);
</script>

</body>
</html>
