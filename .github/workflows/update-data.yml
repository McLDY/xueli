name: Update Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bilibili Data
        run: python3 .github/scripts/fetch_data.py

      - name: Commit & Push from _deploy
        run: |
          cp data.json _deploy/data.json
          cd _deploy
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update data [skip ci]"
            git push
          fi
