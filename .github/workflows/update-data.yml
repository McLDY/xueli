name: Update & Build

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['dynamics.json', 'data.json', 'build.py', 'test/test.py']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bilibili Data
        run: python3 .github/scripts/fetch_data.py

      - name: Build & Obfuscate
        run: |
          python3 build.py
          python3 test/test.py index.html _deploy/index.html
          cp _deploy/index.html index.html

      - name: Commit & Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json dynamics.json index.html _deploy/index.html
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update data + rebuild [skip ci]"
            git push
          fi
