name: Update Bilibili Data

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min
  workflow_dispatch:          # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bilibili Data
        run: |
          UID=394065596
          DATA='{}'

          # 1. Fans + following count
          FANS=$(curl -s -m 10 -H 'User-Agent: Mozilla/5.0' -H 'Referer: https://www.bilibili.com' \
            "https://api.bilibili.com/x/relation/stat?vmid=$UID")
          if echo "$FANS" | grep -q '"code":0'; then
            DATA=$(echo "$FANS" | python3 -c "
  import sys, json
  d = json.load(sys.stdin)
  print(json.dumps({'fans': d['data']['follower'], 'following': d['data']['following']}, ensure_ascii=False))
  ")
          fi

          sleep 2

          # 2. Live status + room info (includes owner name)
          LIVE=$(curl -s -m 10 -H 'User-Agent: Mozilla/5.0' -H 'Referer: https://live.bilibili.com' \
            "https://api.live.bilibili.com/room/v1/Room/getRoomInfoOld?mid=$UID")
          if echo "$LIVE" | grep -q '"code":0'; then
            LIVE_DATA=$(echo "$LIVE" | python3 -c "
  import sys, json
  d = json.load(sys.stdin)['data']
  print(json.dumps({
    'live_status': d.get('live_status', 0),
    'live_title': d.get('title', ''),
    'room_id': d.get('roomid', 0),
    'online': d.get('online', 0)
  }, ensure_ascii=False))
  ")
            DATA=$(echo "$DATA" | python3 -c "
  import sys, json
  a = json.loads(sys.stdin.read())
  a.update(json.loads('$LIVE_DATA'))
  print(json.dumps(a, ensure_ascii=False))
  ")
          fi

          sleep 2

          # 3. Works count (video count from navnum)
          NAVNUM=$(curl -s -m 10 -H 'User-Agent: Mozilla/5.0' -H 'Referer: https://space.bilibili.com/$UID' \
            "https://api.bilibili.com/x/space/navnum?mid=$UID")
          if echo "$NAVNUM" | grep -q '"code":0'; then
            NAVDATA=$(echo "$NAVNUM" | python3 -c "
  import sys, json
  d = json.load(sys.stdin)['data']
  print(json.dumps({
    'works': d.get('video', 0),
    'albums': d.get('album', 0),
    'articles': d.get('article', 0),
    'dynamics': d.get('opus', 0)
  }, ensure_ascii=False))
  ")
            DATA=$(echo "$DATA" | python3 -c "
  import sys, json
  a = json.loads(sys.stdin.read())
  a.update(json.loads('$NAVDATA'))
  print(json.dumps(a, ensure_ascii=False))
  ")
          fi

          # Add timestamp
          DATA=$(echo "$DATA" | python3 -c "
  import sys, json, datetime
  d = json.loads(sys.stdin.read())
  d['updated_at'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
  print(json.dumps(d, ensure_ascii=False))
  ")

          echo "$DATA" > data.json
          echo "Data: $DATA"

      - name: Commit & Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update bilibili data [skip ci]"
            git push
          fi
