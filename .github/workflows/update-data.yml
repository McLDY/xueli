name: Update Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bilibili Data & Dynamics
        env:
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
        run: python3 .github/scripts/fetch_data.py

      - name: Commit & Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json dynamics.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update data [skip ci]"
            git push
          fi
